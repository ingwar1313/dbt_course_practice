sources:
  - name: demo_src
    description: Данные из БД авиаперелетов
    tables:
      - name: aircrafts
        description: Модели самолетов
        columns:
          - name: aircraft_code
            description: Код Модели самолета
          - name: model
            description: Название модели самолета
          - name: range
            description: Неизвестное поле
      - name: airports
        description: Аэропорты
        columns:
          - name: airport_code
            description: Код аэропорта
          - name: airport_name
            description: Название аэропорта
          - name: city
            description: Описание аэропорта 
          - name: coordinates
            description: Координаты аэропорта
          - name: timezone
            description: Часовой пояс аэропорта
      - name: seats
        description: Посадочные места
        columns:
          - name: aircraft_code
            description: Код Модели самолета
          - name: seat_no
            description: Номер посадочного места
          - name: fare_conditions
            description: Условия оплаты
      - name: bookings
        config:
          freshness: 
            warn_after: {count: 6, period: hour}
            error_after: {count: 10000, period: day}
            filter: current_timestamp::date - book_date::date < 30000
          loaded_at_field: book_date::timestamp 
        description: Бронирования
        columns:
          - name: book_ref
            description: ID бронирования
          - name: book_date
            description: Дата бронирования
          - name: total_amount
            description: Общая сумма бронирования
      - name: boarding_passes
        description: Посадочные талоны
        columns:
          - name: ticket_no
            description: ID билета
          - name: flight_id
            description: ID полета
          - name: boarding_no
            description: ID посадочного талона
          - name: seat_no
            description: Номер места
      - name: flights
        description: Полеты
        columns:
          - name: flight_id
            description: ID полета
          - name: flight_no
            description: Номер полета
          - name: scheduled_departure
            description: Время отправления по расписанию
          - name: scheduled_arrival
            description: Время прибытия по расписанию
          - name: departure_airport
            description: Аэропорт отправления
          - name: arrival_airport
            description: Аэропорт прилета
          - name: status
            description: Статус полета
          - name: aircraft_code
            description: Код модели самолета
          - name: actual_departure
            description: Актуальное время отправления
          - name: actual_arrival
            description: Актуальное время прибытия
      - name: ticket_flights
        description: Оплата билетов по полетам
        columns:
          - name: ticket_no
            description: ID билета
          - name: flight_id
            description: ID полета
          - name: fare_conditions
            description: Класс пассажира
          - name: amount
            description: Сумма оплаты
                  